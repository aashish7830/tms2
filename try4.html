<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register with OTP & Google</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .google-btn { background: #db4437; margin-top: 15px; }
        .google-btn:hover { background: #c13527; }
        .toggle-link { margin-top: 15px; display: block; color: #007bff; cursor: pointer; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGIN FORM -->
    <div id="login-box">
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email Address" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button onclick="handleLogin()">Login</button>
        <button class="google-btn" onclick="loginWithGoogle()">Sign in with Google</button>
        <span class="toggle-link" onclick="toggleForm('register')">Naya account banayein (Register)</span>
    </div>

    <!-- REGISTRATION FORM -->
    <div id="register-box" class="hidden">
        <h2>Register</h2>
        <input type="text" id="reg-name" placeholder="Full Name" required>
        <input type="email" id="reg-email" placeholder="Email Address" required>
        <input type="password" id="reg-password" placeholder="Password" required>
        <button onclick="handleRegister()">OTP Bhejein</button>
        <span class="toggle-link" onclick="toggleForm('login')">Pehle se account hai? Login karein</span>
    </div>

    <!-- OTP VERIFICATION FORM -->
    <div id="otp-box" class="hidden">
        <h2>OTP Verification</h2>
        <p>Aapke email par OTP bheja gaya hai.</p>
        <input type="text" id="otp-input" placeholder="Enter 6-Digit OTP" maxlength="6" required>
        <button onclick="verifyOTP()">Verify & Register</button>
        <span class="toggle-link" onclick="toggleForm('register')">Wapas jayein</span>
    </div>
</div>

<!-- Firebase SDKs (Google Login Ke Liye) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // Firebase Configuration (Apne Firebase Console se badlein)
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_FIREBASE_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const provider = new firebase.auth.GoogleAuthProvider();

    // UI Toggle Function
    function toggleForm(form) {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('register-box').classList.add('hidden');
        document.getElementById('otp-box').classList.add('hidden');

        if(form === 'login') document.getElementById('login-box').classList.remove('hidden');
        if(form === 'register') document.getElementById('register-box').classList.remove('hidden');
        if(form === 'otp') document.getElementById('otp-box').classList.remove('hidden');
    }

    // 1. Google Login
    function loginWithGoogle() {
        firebase.auth().signInWithPopup(provider)
        .then((result) => {
            alert("Google Login Successful! Welcome " + result.user.displayName);
            // Yahan se aap user ko dashboard par bhej sakte hain
        }).catch((error) => {
            alert("Google Login Failed: " + error.message);
        });
    }

    // Backend API URL
    const BACKEND_URL = "http://localhost:5000/api";
    let temporaryEmail = "";

    // 2. Normal Register (OTP Request)
    async function handleRegister() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        if(!name || !email || !password) return alert("Sari details bharein!");

        temporaryEmail = email; // OTP verify karne ke liye email save kar rhe hain

        const response = await fetch(`${BACKEND_URL}/send-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();
        if(response.ok) {
            alert(data.message);
            toggleForm('otp');
        } else {
            alert(data.message);
        }
    }

    // 3. OTP Verify karne ke liye
    async function verifyOTP() {
        const otp = document.getElementById('otp-input').value;

        const response = await fetch(`${BACKEND_URL}/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: temporaryEmail, otp })
        });

        const data = await response.json();
        if(response.ok) {
            alert("Registration Successful! Ab aap login kar sakte hain.");
            toggleForm('login');
        } else {
            alert(data.message);
        }
    }

    // 4. Normal Login
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        const response = await fetch(`${BACKEND_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if(response.ok) {
            alert("Login Successful! Token: " + data.token);
        } else {
            alert(data.message);
        }
    }
</script>
</body>
<script>
    const express = require('express');
const cors = require('cors');
const bcrypt = require('bcryptjs');
const jwt = require('jsonwebtoken');
const nodemailer = require('nodemailer');

const app = express();
app.use(cors());
app.use(express.json());

// Dummy Database (Real app me MongoDB/MySQL use karein)
let usersDB = [];
let tempOTPStore = {}; // Temporary OTP store karne ke liye

const JWT_SECRET = "aapka_super_secret_key";

// Email Transporter (Nodemailer setup)
// Note: Isme aapko apni Email aur App Password dalna hoga
const transporter = nodemailer.createTransport({
    service: 'gmail',
    auth: {
        user: 'YOUR_EMAIL@gmail.com', 
        pass: 'YOUR_GMAIL_APP_PASSWORD' // Google Account -> Security -> App Passwords
    }
});

// 1. ROUTE: Send OTP (Registration Step 1)
app.post('/api/send-otp', async (req, res) => {
    const { name, email, password } = req.body;

    // Check agar user pehle se hai
    const userExists = usersDB.find(u => u.email === email);
    if (userExists) return res.status(400).json({ message: "Email pehle se registered hai!" });

    // 6-digit OTP generate karein
    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    
    // Hash password
    const hashedPassword = await bcrypt.hash(password, 10);

    // Temp store data jab tak OTP verify nahi hota
    tempOTPStore[email] = { name, email, password: hashedPassword, otp };

    // Email bhejna
    const mailOptions = {
        from: 'YOUR_EMAIL@gmail.com',
        to: email,
        subject: 'Aapka Registration OTP',
        text: `Hello ${name}, aapka verification OTP hai: ${otp}`
    };

    transporter.sendMail(mailOptions, (error, info) => {
        if (error) {
            console.log(error);
            return res.status(500).json({ message: "Email bhejne me dikkat aayi!" });
        }
        res.status(200).json({ message: "OTP aapke email par bhej diya gaya hai!" });
    });
});

// 2. ROUTE: Verify OTP & Save User (Registration Step 2)
app.post('/api/verify-otp', (req, res) => {
    const { email, otp } = req.body;

    const tempUser = tempOTPStore[email];

    if (!tempUser) {
        return res.status(400).json({ message: "Koyi data nahi mila. Fir se try karein." });
    }

    if (tempUser.otp === otp) {
        // OTP sahi hai, ab user ko main DB me save karein
        usersDB.push({
            name: tempUser.name,
            email: tempUser.email,
            password: tempUser.password
        });

        // Temp store se delete karein
        delete tempOTPStore[email];

        return res.status(200).json({ message: "Registration successful!" });
    } else {
        return res.status(400).json({ message: "Galat OTP! Fir se check karein." });
    }
});

// 3. ROUTE: Normal Login
app.post('/api/login', async (req, res) => {
    const { email, password } = req.body;

    const user = usersDB.find(u => u.email === email);
    if (!user) return res.status(400).json({ message: "User nahi mila!" });

    const isMatch = await bcrypt.compare(password, user.password);
    if (!isMatch) return res.status(400).json({ message: "Galat password!" });

    // JWT Token generate karein
    const token = jwt.sign({ email: user.email }, JWT_SECRET, { expiresIn: '1h' });

    res.status(200).json({ message: "Login successful", token });
});

// Server chalu karein
app.listen(5000, () => console.log("Server running on port 5000"));
</script>
</html>
